services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_energy
      MYSQL_USER: energy
      MYSQL_PASSWORD: energy123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: campus-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: campus
      DOCKER_INFLUXDB_INIT_BUCKET: energy
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: campus-energy-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: campus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: campus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  backend:
    build: ./backend
    container_name: campus-backend
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: energy
      MYSQL_PASSWORD: energy123
      MYSQL_DATABASE: campus_energy
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: campus-energy-token
      INFLUXDB_ORG: campus
      INFLUXDB_BUCKET: energy
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUXDB_VERSION: "2"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: campus-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
  influxdb_data:

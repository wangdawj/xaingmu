# =============================================================================
# Docker Compose — 校园能耗监测平台容器化编排
# =============================================================================
# 一键启动命令：docker compose up -d
# 启动顺序由 depends_on + healthcheck 自动控制（MySQL 就绪后才启动其他服务）
# =============================================================================

version: "3.8"

services:

  # ============================ 1. MySQL 数据库 ============================
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123        # root 密码
      MYSQL_DATABASE: campus_energy       # 自动创建数据库
      MYSQL_USER: energy                  # 应用用户
      MYSQL_PASSWORD: energy123           # 应用密码
    ports:
      - "3307:3306"                       # 主机 3307 → 容器 3306（避免与本地 MySQL 冲突）
    volumes:
      - mysql_data:/var/lib/mysql         # 持久化数据卷
      - ./database/mysql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql  # 首次启动自动建表
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uenergy", "-penergy123"]
      interval: 10s                       # 每 10 秒检查一次
      timeout: 5s                         # 超时时间
      retries: 5                          # 连续失败 5 次标记为 unhealthy
      start_period: 30s                   # 启动后等待 30 秒再开始检查（MySQL 初始化慢）
    networks:
      - campus-net                        # 加入自建网络，容器间通过服务名通信

  # ============================ 2. Zookeeper（Kafka 依赖） ============================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: campus-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181         # 客户端连接端口
      ZOOKEEPER_TICK_TIME: 2000           # 心跳间隔（毫秒）
    networks:
      - campus-net

  # ============================ 3. Kafka 消息队列 ============================
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: campus-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"                       # 主机 9092 → 容器 9092（本地开发调试用）
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      # advertised_listeners 解释：
      #   PLAINTEXT://kafka:29092       → 容器间通信地址（Producer/Consumer 用 kafka:29092）
      #   PLAINTEXT_HOST://localhost:9092 → 主机外部访问地址（本地开发调试用）
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # 单节点 Kafka，副本因子设为 1
    networks:
      - campus-net

  # ============================ 4. Flask 后端 ============================
  backend:
    build: ./backend
    container_name: campus-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy       # 等 MySQL healthcheck 通过后才启动
      kafka:
        condition: service_started       # 等 Kafka 启动即可（不需要健康检查）
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env                   # 加载环境变量（数据库连接等）
    volumes:
      - ./ml:/app/ml                     # 挂载 ML 脚本目录（容器内可运行 python ml/prediction/energy_forecast.py）
      - ./data-pipeline:/app/data-pipeline  # 挂载清洗脚本目录
    networks:
      - campus-net

  # ============================ 5. Vue 前端 (Nginx 部署) ============================
  frontend:
    build: ./frontend
    container_name: campus-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"                        # 主机 8080 → 容器 Nginx 80
    networks:
      - campus-net

  # ============================ 6. 数据处理流水线 ============================
  pipeline:
    build: ./data-pipeline
    container_name: campus-pipeline
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - campus-net

# ============================ 数据卷 ============================
volumes:
  mysql_data:                            # MySQL 数据持久化（重启不丢数据）

# ============================ 自建网络 ============================
networks:
  campus-net:
    driver: bridge                        # 桥接网络：容器间通过服务名互访（如 kafka:29092）
